<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TheSubhub Orders - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
      color: white; 
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .login-container {
      background: rgba(30, 41, 59, 0.95);
      padding: 50px 40px;
      border-radius: 15px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(10px);
      max-width: 400px;
      width: 100%;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    h1 { 
      color: #22c55e; 
      text-align: center; 
      text-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
      font-size: 2em;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #cbd5e1;
      font-size: 14px;
      font-weight: 500;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] { 
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #1f2937;
      color: white;
      transition: all 0.3s ease;
      font-size: 16px;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
    }

    button { 
      width: 100%;
      background: linear-gradient(45deg, #22c55e, #16a34a); 
      color: black; 
      cursor: pointer; 
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 16px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
    }

    button:active {
      transform: scale(0.98);
    }

    .toggle-form {
      text-align: center;
      margin-top: 20px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .toggle-form button {
      background: none;
      border: none;
      color: #22c55e;
      cursor: pointer;
      text-decoration: underline;
      padding: 0;
      font-size: 14px;
      box-shadow: none;
      margin: 0;
      display: inline;
      margin-left: 5px;
    }

    .toggle-form button:hover {
      transform: none;
      box-shadow: none;
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .success {
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid #22c55e;
      color: #86efac;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      font-size: 14px;
    }

    .form-section {
      display: none;
    }

    .form-section.active {
      display: block;
    }

    .loading {
      display: none;
      text-align: center;
      color: #22c55e;
    }

    .spinner {
      border: 2px solid rgba(34, 197, 94, 0.2);
      border-top: 2px solid #22c55e;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 30px 20px;
      }

      h1 {
        font-size: 1.5em;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"],
      button {
        font-size: 16px; /* Prevents zoom on iOS */
      }
    }
  </style>
</head>

<body>

<div class="login-container">
  <h1>🛒 TheSubhub Orders</h1>
  <p class="subtitle">Secure Order Management System</p>

  <div id="errorMsg" class="error"></div>
  <div id="successMsg" class="success"></div>

  <!-- Login Form -->
  <form id="loginForm" class="form-section active" onsubmit="handleLogin(event)">
    <div class="form-group">
      <label for="login-username">Username</label>
      <input type="text" id="login-username" placeholder="Enter your username" required autocomplete="username">
    </div>
    <div class="form-group">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="Enter your password" required autocomplete="current-password">
    </div>
    <button type="submit">Login</button>
    <div class="toggle-form">
      Don't have an account? <button type="button" onclick="toggleForm('register')">Sign Up</button>
    </div>
  </form>

  <!-- Register Form -->
  <form id="registerForm" class="form-section" onsubmit="handleRegister(event)">
    <div class="form-group">
      <label for="register-username">Username</label>
      <input type="text" id="register-username" placeholder="Choose a username" required>
    </div>
    <div class="form-group">
      <label for="register-email">Email</label>
      <input type="email" id="register-email" placeholder="Enter your email" required>
    </div>
    <div class="form-group">
      <label for="register-password">Password</label>
      <input type="password" id="register-password" placeholder="Create a password (min 6 chars)" required minlength="6">
    </div>
    <div class="form-group">
      <label for="register-confirm">Confirm Password</label>
      <input type="password" id="register-confirm" placeholder="Confirm your password" required>
    </div>
    <button type="submit">Sign Up</button>
    <div class="toggle-form">
      Already have an account? <button type="button" onclick="toggleForm('login')">Login</button>
    </div>
  </form>

  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Processing...</p>
  </div>
</div>

<script>
function toggleForm(form) {
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  
  if (form === 'register') {
    loginForm.classList.remove('active');
    registerForm.classList.add('active');
  } else {
    registerForm.classList.remove('active');
    loginForm.classList.add('active');
  }
  
  clearMessages();
}

function clearMessages() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
}

function showError(message) {
  const errorEl = document.getElementById('errorMsg');
  errorEl.textContent = message;
  errorEl.style.display = 'block';
}

function showSuccess(message) {
  const successEl = document.getElementById('successMsg');
  successEl.textContent = message;
  successEl.style.display = 'block';
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
}

async function handleLogin(event) {
  event.preventDefault();
  clearMessages();
  
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;

  if (!username || !password) {
    showError('Please enter both username and password');
    return;
  }

  showLoading(true);

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Login failed');
    }

    // Store token in localStorage
    localStorage.setItem('token', data.token);
    localStorage.setItem('username', username);

    showSuccess('Login successful! Redirecting...');
    setTimeout(() => {
      window.location.href = '/index.html';
    }, 500);
  } catch (err) {
    showError(err.message || 'Login failed. Please try again.');
  } finally {
    showLoading(false);
  }
}

async function handleRegister(event) {
  event.preventDefault();
  clearMessages();

  const username = document.getElementById('register-username').value.trim();
  const email = document.getElementById('register-email').value.trim();
  const password = document.getElementById('register-password').value;
  const confirm = document.getElementById('register-confirm').value;

  if (!username || !email || !password || !confirm) {
    showError('Please fill in all fields');
    return;
  }

  if (password !== confirm) {
    showError('Passwords do not match');
    return;
  }

  if (password.length < 6) {
    showError('Password must be at least 6 characters');
    return;
  }

  showLoading(true);

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Registration failed');
    }

    showSuccess('Registration successful! You can now login.');
    setTimeout(() => {
      toggleForm('login');
      document.getElementById('registerForm').reset();
      document.getElementById('register-username').value = username;
    }, 500);
  } catch (err) {
    showError(err.message || 'Registration failed. Please try again.');
  } finally {
    showLoading(false);
  }
}

// Check if user is already logged in
function checkAuth() {
  const token = localStorage.getItem('token');
  if (token) {
    window.location.href = '/index.html';
  }
}

checkAuth();
</script>

</body>
</html>
